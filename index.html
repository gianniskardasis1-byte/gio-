<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skribbl — Multiplayer Draw & Guess</title>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f0f5;
      color: #222;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Screens ── */
    .screen { display: none; width: 100%; height: 100%; }
    .screen.active { display: flex; }

    /* ───────────────────────────────── MENU ─── */
    #screen-menu {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    }
    #screen-menu h1 {
      font-size: 3.2rem;
      color: #fff;
      letter-spacing: 2px;
      text-shadow: 0 2px 12px rgba(80,140,255,.7);
    }
    #screen-menu p.subtitle {
      color: #9ab4ff;
      font-size: 1.1rem;
      margin-top: -10px;
    }
    .menu-card {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 16px;
      padding: 32px 40px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 360px;
      backdrop-filter: blur(6px);
    }
    .menu-card label { color: #cdd8ff; font-size: .88rem; }
    .menu-card input {
      padding: 10px 14px;
      border-radius: 8px;
      border: 1.5px solid rgba(255,255,255,.2);
      background: rgba(255,255,255,.1);
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
    }
    .menu-card input:focus { border-color: #508cff; }
    .menu-card input::placeholder { color: rgba(255,255,255,.35); }
    .row-btns { display: flex; gap: 10px; }
    .btn {
      flex: 1;
      padding: 11px 0;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform .1s, box-shadow .2s;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: #508cff; color: #fff; box-shadow: 0 4px 14px rgba(80,140,255,.45); }
    .btn-primary:hover { background: #3c78f0; }
    .btn-secondary { background: rgba(255,255,255,.12); color: #cdd8ff; }
    .btn-secondary:hover { background: rgba(255,255,255,.2); }
    #menu-error { color: #ff7878; font-size: .85rem; min-height: 18px; text-align: center; }

    /* ───────────────────────────────── LOBBY ─── */
    #screen-lobby {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: #1a1a2e;
    }
    #screen-lobby h2 { color: #fff; font-size: 1.8rem; }
    #lobby-info { color: #9ab4ff; font-size: .95rem; }
    #lobby-players {
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 14px;
      padding: 20px 28px;
      min-width: 320px;
      max-height: 280px;
      overflow-y: auto;
    }
    #lobby-players h3 { color: #cdd8ff; margin-bottom: 12px; font-size: .95rem; text-transform: uppercase; letter-spacing: 1px; }
    .lobby-player {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 4px;
      border-bottom: 1px solid rgba(255,255,255,.07);
      color: #fff;
    }
    .lobby-player:last-child { border-bottom: none; }
    .player-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: #508cff;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: .85rem; color: #fff;
      flex-shrink: 0;
    }
    .host-badge {
      font-size: .7rem; background: #f0b429; color: #1a1a2e;
      padding: 2px 7px; border-radius: 20px; font-weight: 700; margin-left: auto;
    }
    #btn-start-game { display: none; width: 240px; }

    /* ───────────────────────────────── GAME ─── */
    #screen-game {
      flex-direction: column;
      overflow: hidden;
      height: 100vh;
    }

    /* top bar */
    #game-topbar {
      display: flex;
      align-items: center;
      background: #2e3250;
      padding: 8px 16px;
      gap: 16px;
      flex-shrink: 0;
    }
    #round-label { color: #9ab4ff; font-size: .9rem; }
    #word-hint {
      flex: 1;
      text-align: center;
      font-size: 1.5rem;
      letter-spacing: 6px;
      color: #fff;
      font-weight: 700;
    }
    #timer-box {
      min-width: 56px; height: 40px;
      border-radius: 10px;
      background: #508cff;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; font-weight: 700; color: #fff;
      transition: background .4s;
    }
    #timer-box.urgent { background: #e53e3e; }

    /* main area */
    #game-main {
      display: flex;
      flex: 1;
      overflow: hidden;
      gap: 0;
    }

    /* left panel — players */
    #panel-players {
      width: 180px;
      flex-shrink: 0;
      background: #252845;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 10px 0;
    }
    .score-player {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid rgba(255,255,255,.05);
      color: #cdd8ff;
      font-size: .88rem;
    }
    .score-player .player-avatar { width: 26px; height: 26px; font-size: .75rem; }
    .score-player .score-val { margin-left: auto; color: #f0b429; font-weight: 700; }
    .score-player.drawing { background: rgba(80,140,255,.18); }
    .score-player.guessed { opacity: .55; }

    /* canvas area */
    #canvas-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #1e2035;
      overflow: hidden;
    }
    #canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      cursor: crosshair;
    }
    #draw-canvas {
      position: absolute;
      top: 0; left: 0;
      background: #fff;
    }

    /* toolbar */
    #toolbar {
      background: #2e3250;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .color-swatch {
      width: 24px; height: 24px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform .1s, border-color .15s;
    }
    .color-swatch:hover { transform: scale(1.2); }
    .color-swatch.selected { border-color: #fff; transform: scale(1.25); }
    .toolbar-sep { width: 1px; height: 24px; background: rgba(255,255,255,.2); }
    .size-btn {
      border: 2px solid rgba(255,255,255,.3);
      background: transparent;
      border-radius: 50%;
      cursor: pointer;
      transition: border-color .15s, transform .1s;
      display: flex; align-items: center; justify-content: center;
    }
    .size-btn:hover, .size-btn.selected { border-color: #508cff; transform: scale(1.1); }
    .size-dot { background: #fff; border-radius: 50%; }
    #btn-clear-canvas {
      margin-left: auto;
      padding: 5px 14px;
      background: rgba(220,60,60,.75);
      color: #fff;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      font-size: .85rem;
      font-weight: 600;
    }
    #btn-clear-canvas:hover { background: #dc3c3c; }

    /* right panel — chat */
    #panel-chat {
      width: 220px;
      flex-shrink: 0;
      background: #252845;
      display: flex;
      flex-direction: column;
    }
    #chat-log {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .chat-msg {
      font-size: .82rem;
      line-height: 1.35;
      color: #cdd8ff;
      word-break: break-word;
    }
    .chat-msg.correct { color: #48bb78; font-weight: 600; }
    .chat-msg.wrong { color: #fc8181; }
    .chat-msg.info { color: #90cdf4; font-style: italic; }
    #chat-input-row {
      display: flex;
      padding: 8px;
      gap: 6px;
      border-top: 1px solid rgba(255,255,255,.08);
    }
    #chat-input {
      flex: 1;
      padding: 7px 10px;
      border-radius: 7px;
      border: 1.5px solid rgba(255,255,255,.15);
      background: rgba(255,255,255,.08);
      color: #fff;
      font-size: .88rem;
      outline: none;
    }
    #chat-input:focus { border-color: #508cff; }
    #chat-input::placeholder { color: rgba(255,255,255,.3); }
    #btn-send {
      padding: 7px 12px;
      background: #508cff;
      border: none;
      border-radius: 7px;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      font-size: .88rem;
    }
    #btn-send:hover { background: #3c78f0; }

    /* ─────────────── ROUND RESULT overlay ─── */
    #screen-round-result {
      position: fixed; inset: 0;
      background: rgba(15,20,50,.82);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    #screen-round-result.active { display: flex; }
    .result-card {
      background: #2e3250;
      border-radius: 20px;
      padding: 36px 52px;
      text-align: center;
      color: #fff;
      min-width: 340px;
    }
    .result-card h2 { font-size: 1.5rem; margin-bottom: 6px; }
    .result-card .word-reveal { font-size: 2rem; font-weight: 700; color: #f0b429; margin: 10px 0; }
    .result-card .reason { color: #9ab4ff; font-size: .9rem; margin-bottom: 20px; }
    #result-scores { display: flex; flex-direction: column; gap: 7px; margin-top: 10px; }
    .result-score-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 12px;
      background: rgba(255,255,255,.07);
      border-radius: 8px;
      font-size: .92rem;
    }
    .result-score-val { color: #f0b429; font-weight: 700; }

    /* ─────────────── GAME OVER ─── */
    #screen-gameover {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: linear-gradient(135deg, #1a1a2e, #0f3460);
      display: none;
    }
    #screen-gameover.active { display: flex; }
    #screen-gameover h1 { color: #f0b429; font-size: 3rem; }
    #final-scores {
      background: rgba(255,255,255,.08);
      border-radius: 16px;
      padding: 24px 36px;
      min-width: 320px;
    }
    #final-scores h3 { color: #9ab4ff; margin-bottom: 14px; text-transform: uppercase; letter-spacing: 1px; font-size: .88rem; }
    .final-score-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 9px 0;
      border-bottom: 1px solid rgba(255,255,255,.08);
      color: #fff;
    }
    .final-score-row:last-child { border-bottom: none; }
    .final-rank { width: 28px; text-align: center; font-weight: 700; color: #9ab4ff; }
    .final-rank.gold { color: #f0b429; }
    .final-rank.silver { color: #c0c0c0; }
    .final-rank.bronze { color: #cd7f32; }
    .final-score-pts { margin-left: auto; color: #f0b429; font-weight: 700; }
  </style>
</head>
<body>

  <!-- ══════════ MENU ══════════ -->
  <section id="screen-menu" class="screen active">
    <h1>✏️ Skribbl</h1>
    <p class="subtitle">Multiplayer Draw &amp; Guess</p>
    <div class="menu-card">
      <label for="input-name">Your name</label>
      <input id="input-name" type="text" placeholder="Enter your name…" maxlength="20" autocomplete="off" />

      <label for="input-ip">Server IP <span style="color:#508cff">(leave blank to host)</span></label>
      <input id="input-ip" type="text" placeholder="e.g. 192.168.1.10" autocomplete="off" />

      <label for="input-port">Port</label>
      <input id="input-port" type="text" value="5555" autocomplete="off" />

      <div class="row-btns">
        <button id="btn-host" class="btn btn-primary">Host Game</button>
        <button id="btn-join" class="btn btn-secondary">Join Game</button>
      </div>
      <p id="menu-error"></p>
    </div>
  </section>

  <!-- ══════════ LOBBY ══════════ -->
  <section id="screen-lobby" class="screen">
    <h2>Game Lobby</h2>
    <p id="lobby-info"></p>
    <div id="lobby-players">
      <h3>Players</h3>
      <div id="lobby-player-list"></div>
    </div>
    <button id="btn-start-game" class="btn btn-primary">Start Game ▶</button>
  </section>

  <!-- ══════════ GAME ══════════ -->
  <section id="screen-game" class="screen">
    <!-- top bar -->
    <div id="game-topbar">
      <span id="round-label">Round 1 / 6</span>
      <span id="word-hint">_ _ _ _ _</span>
      <div id="timer-box">60</div>
    </div>

    <!-- main -->
    <div id="game-main">

      <!-- left: players -->
      <div id="panel-players"></div>

      <!-- centre: canvas + toolbar -->
      <div id="canvas-area">
        <div id="canvas-wrap">
          <canvas id="draw-canvas"></canvas>
        </div>
        <!-- toolbar (only visible to drawer) -->
        <div id="toolbar">
          <!-- colour swatches injected by JS -->
          <div class="toolbar-sep"></div>
          <!-- size buttons injected by JS -->
          <button id="btn-clear-canvas">🗑 Clear</button>
        </div>
      </div>

      <!-- right: chat -->
      <div id="panel-chat">
        <div id="chat-log"></div>
        <div id="chat-input-row">
          <input id="chat-input" type="text" placeholder="Guess the word…" autocomplete="off" maxlength="120" />
          <button id="btn-send">➤</button>
        </div>
      </div>
    </div>
  </section>

  <!-- ══════════ ROUND RESULT (overlay) ══════════ -->
  <div id="screen-round-result">
    <div class="result-card">
      <h2 id="result-heading">Round Over</h2>
      <div class="word-reveal" id="result-word"></div>
      <p class="reason" id="result-reason"></p>
      <div id="result-scores"></div>
    </div>
  </div>

  <!-- ══════════ GAME OVER ══════════ -->
  <section id="screen-gameover" class="screen">
    <h1>🏆 Game Over</h1>
    <div id="final-scores">
      <h3>Final Scores</h3>
      <div id="final-score-list"></div>
    </div>
    <button id="btn-play-again" class="btn btn-primary" style="width:220px">Play Again</button>
  </section>

  <script src="ui.js"></script>
</body>
</html>
